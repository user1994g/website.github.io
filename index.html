<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack Miller Portfolio</title>
</head>

<body>
  <div id="root"></div>
  <script type="module">
    const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    if (isLocal) {
      import("/main.tsx");
    } else if (!location.pathname.startsWith("/website.github.io/dist/")) {
      location.replace("/website.github.io/dist/index.html");
    }
  </script>
</body>

</html>
